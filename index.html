<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traductor CHU</title>

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .contenedor {
      background: white;
      width: 85%;
      max-width: 430px;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      text-align: center;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 18px 28px;
      margin: 10px;
      font-size: 22px;
      color: white;
    }

    #btnEscuchar {
      background: #2196f3;
    }

    #btnParar {
      background: #f44336;
    }

    .caja {
      background: #f5f5f5;
      margin-top: 18px;
      padding: 18px;
      border-radius: 14px;
      text-align: left;
      font-size: 20px;
      word-wrap: break-word;
    }

    .titulo {
      font-weight: bold;
      margin-bottom: 10px;
    }

    #estado {
      font-weight: bold;
      margin: 20px 0;
      font-size: 20px;
    }
  </style>
</head>

<body>

  <div class="contenedor">
    <h1>🎤 Traductor CHU</h1>
    <p>Traducción por sílabas</p>

    <button id="btnEscuchar">🎤 Escuchar</button>
    <button id="btnParar">⛔ Parar</button>

    <div id="estado">Parado</div>

    <div class="caja">
      <div class="titulo">Texto escuchado:</div>
      <div id="textoEscuchado">---</div>
    </div>

    <div class="caja">
      <div class="titulo">Texto limpio:</div>
      <div id="textoLimpio">---</div>
    </div>

    <div class="caja">
      <div class="titulo">Traducción:</div>
      <div id="traduccion">---</div>
    </div>
  </div>

  <script>
    const btnEscuchar = document.getElementById("btnEscuchar");
    const btnParar = document.getElementById("btnParar");
    const estado = document.getElementById("estado");
    const textoEscuchado = document.getElementById("textoEscuchado");
    const textoLimpio = document.getElementById("textoLimpio");
    const traduccion = document.getElementById("traduccion");

    let reconocimiento;

    function limpiarTexto(texto) {
      return texto
        .toLowerCase()
        .replace(/[.,!?¿¡]/g, "")
        .trim();
    }

    function traducirChu(texto) {
      return texto
        .split(" ")
        .map(palabra => {
          let partes = palabra.split("chu");
          partes = partes.filter(parte => parte.trim() !== "");
          return partes.join("");
        })
        .join(" ");
    }

    if ("webkitSpeechRecognition" in window) {
      reconocimiento = new webkitSpeechRecognition();
      reconocimiento.lang = "es-ES";
      reconocimiento.continuous = true;
      reconocimiento.interimResults = false;

      reconocimiento.onstart = function() {
        estado.textContent = "Escuchando...";
      };

      reconocimiento.onresult = function(event) {
        let texto = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
          texto += event.results[i][0].transcript;
        }

        const limpio = limpiarTexto(texto);
        const traducido = traducirChu(limpio);

        textoEscuchado.textContent = texto;
        textoLimpio.textContent = limpio;
        traduccion.textContent = traducido;
      };

      reconocimiento.onerror = function(event) {
        estado.textContent = "Error: " + event.error;
      };

      reconocimiento.onend = function() {
        estado.textContent = "Parado";
      };

    } else {
      estado.textContent = "Tu navegador no permite reconocimiento de voz";
    }

    btnEscuchar.addEventListener("click", function() {
      if (reconocimiento) {
        reconocimiento.start();
      }
    });

    btnParar.addEventListener("click", function() {
      if (reconocimiento) {
        reconocimiento.stop();
      }
    });
  </script>

</body>
</html>
