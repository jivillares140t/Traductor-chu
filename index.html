<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traductor Chu Mejorado</title>

<link rel="manifest" href="manifest.json">

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding:15px;
}

.contenedor{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    width:100%;
    max-width:520px;
    text-align:center;
}

h1{
    margin-top:0;
}

button{
    background:#2196F3;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin:8px;
}

.parar{
    background:#f44336;
}

.caja{
    background:#f7f7f7;
    padding:15px;
    border-radius:10px;
    margin-top:18px;
    text-align:left;
    min-height:35px;
    word-wrap:break-word;
}

.titulo{
    font-weight:bold;
    margin-bottom:8px;
}

.estado{
    margin-top:10px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="contenedor">

<h1>🎤 Traductor CHU</h1>

<p>Versión mejorada para hablar rápido</p>

<button onclick="escuchar()">🎤 Escuchar</button>

<button class="parar" onclick="parar()">
⛔ Parar
</button>

<div class="estado" id="estado">
Pulsa Escuchar
</div>

<div class="caja">
<div class="titulo">Texto escuchado:</div>
<div id="original">...</div>
</div>

<div class="caja">
<div class="titulo">Texto limpio:</div>
<div id="limpio">...</div>
</div>

<div class="caja">
<div class="titulo">Traducción:</div>
<div id="traducido">...</div>
</div>

</div>

<script>

let recognition;
let escuchando = false;
let textoAcumulado = "";

function limpiarTexto(texto){

    texto = texto.toLowerCase();

    texto = texto.replace(/[.,;:¿?¡!]/g, " ");

    texto = texto
        .replaceAll("chú", "chu")
        .replaceAll("chuu", "chu")
        .replaceAll("choo", "chu")
        .replaceAll("chou", "chu")
        .replaceAll("shu", "chu")
        .replaceAll("xu", "chu");

    texto = texto
        .replaceAll("cho la", "chuo chula")
        .replaceAll("chu la", "chula")
        .replaceAll("chu o", "chuo");

    texto = texto.replace(/\s+/g, " ").trim();

    return texto;
}

function traducirChu(texto){

    texto = limpiarTexto(texto);

    let partes = texto.split(" ");
    let resultado = "";

    for(let parte of partes){

        parte = parte.trim();

        if(parte === ""){
            continue;
        }

        if(parte.startsWith("chu")){
            resultado += parte.substring(3);
        }else{
            resultado += parte.replaceAll("chu", "");
        }
    }

    return resultado;
}

function iniciarReconocimiento(){

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Tu navegador no soporta reconocimiento de voz");
        return null;
    }

    const rec = new SpeechRecognition();

    rec.lang = "es-ES";
    rec.continuous = true;
    rec.interimResults = true;
    rec.maxAlternatives = 5;

    rec.onstart = function(){

        escuchando = true;

        document.getElementById("estado").innerText =
        "Escuchando...";
    };

    rec.onresult = function(event){

        let provisional = "";
        let final = "";

        for(let i = event.resultIndex; i < event.results.length; i++){

            let mejor =
            event.results[i][0].transcript;

            for(let j = 0; j < event.results[i].length; j++){

                let candidato =
                event.results[i][j].transcript.toLowerCase();

                if(
                    candidato.includes("chu") ||
                    candidato.includes("shu") ||
                    candidato.includes("cho")
                ){
                    mejor = candidato;
                    break;
                }
            }

            if(event.results[i].isFinal){
                final += mejor + " ";
            }else{
                provisional += mejor + " ";
            }
        }

        if(final.trim() !== ""){
            textoAcumulado += final;
        }

        let escuchado =
        (textoAcumulado + provisional).trim();

        let limpio =
        limpiarTexto(escuchado);

        let traducido =
        traducirChu(escuchado);

        document.getElementById("original").innerText =
        escuchado || "...";

        document.getElementById("limpio").innerText =
        limpio || "...";

        document.getElementById("traducido").innerText =
        traducido || "...";
    };

    rec.onerror = function(event){

        document.getElementById("estado").innerText =
        "Error: " + event.error;
    };

    rec.onend = function(){

        if(escuchando){

            try{
                rec.start();
            }catch(e){}

        }else{

            document.getElementById("estado").innerText =
            "Parado";
        }
    };

    return rec;
}

function escuchar(){

    textoAcumulado = "";

    document.getElementById("original").innerText = "...";
    document.getElementById("limpio").innerText = "...";
    document.getElementById("traducido").innerText = "...";

    if(!recognition){
        recognition = iniciarReconocimiento();
    }

    if(recognition){

        try{
            recognition.start();
        }catch(e){

            document.getElementById("estado").innerText =
            "Ya está escuchando";
        }
    }
}

function parar(){

    escuchando = false;

    if(recognition){
        recognition.stop();
    }

    document.getElementById("estado").innerText =
    "Parado";
}

</script>

</body>
</html>
