<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traductor Chu</title>

<link rel="manifest" href="manifest.json">

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f2f2f2;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .contenedor{
        background:white;
        padding:30px;
        border-radius:20px;
        box-shadow:0 0 15px rgba(0,0,0,0.2);
        width:90%;
        max-width:500px;
        text-align:center;
    }

    button{
        background:#2196F3;
        color:white;
        border:none;
        padding:15px 25px;
        border-radius:12px;
        font-size:18px;
        cursor:pointer;
        margin-top:15px;
    }

    .caja{
        background:#f7f7f7;
        padding:15px;
        border-radius:10px;
        margin-top:20px;
        text-align:left;
        word-wrap:break-word;
    }

    .titulo{
        font-weight:bold;
        margin-bottom:8px;
    }
</style>
</head>

<body>

<div class="contenedor">

    <h1>🎤 Traductor CHU</h1>

    <p>Pulsa el botón y habla en idioma "chu"</p>

    <button onclick="escuchar()">🎤 Hablar</button>

    <div class="caja">
        <div class="titulo">Texto escuchado:</div>
        <div id="original">...</div>
    </div>

    <div class="caja">
        <div class="titulo">Traducción:</div>
        <div id="traducido">...</div>
    </div>

</div>

<script>

function traducirChu(texto){

    let palabras = texto.split(" ");
    let resultado = "";

    for(let palabra of palabras){

        if(palabra.startsWith("chu")){
            resultado += palabra.substring(3);
        }else{
            resultado += palabra;
        }

    }

    return resultado;
}

function escuchar(){

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Tu navegador no soporta reconocimiento de voz");
        return;
    }

    const recognition = new SpeechRecognition();

    recognition.lang = "es-ES";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.start();

    recognition.onresult = function(event){

        let texto = event.results[0][0].transcript.toLowerCase();

        document.getElementById("original").innerText = texto;

        let traduccion = traducirChu(texto);

        document.getElementById("traducido").innerText = traduccion;
    };

    recognition.onerror = function(event){
        alert("Error: " + event.error);
    };
}

</script>

</body>
</html>
