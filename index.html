<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Traductor CHU</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f2f2f7;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.contenedor{
    background:white;
    width:85%;
    max-width:450px;
    padding:30px;
    border-radius:25px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    text-align:center;
}

h1{
    font-size:34px;
}

button{
    border:none;
    padding:18px 28px;
    border-radius:14px;
    font-size:22px;
    color:white;
    margin:10px;
}

#escuchar{
    background:#2196f3;
}

#parar{
    background:#f44336;
}

.caja{
    margin-top:20px;
    background:#f5f5f5;
    padding:18px;
    border-radius:14px;
    text-align:left;
    font-size:22px;
    word-wrap:break-word;
}

.titulo{
    font-weight:bold;
    margin-bottom:10px;
}

#estado{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="contenedor">

<h1>🎤 Traductor CHU</h1>

<p>
Habla separado:<br>
<b>"chu ... ho ... chu ... la"</b>
</p>

<button id="escuchar">🎤 Escuchar</button>
<button id="parar">⛔ Parar</button>

<div id="estado">Parado</div>

<div class="caja">
<div class="titulo">Escuchado:</div>
<div id="texto">---</div>
</div>

<div class="caja">
<div class="titulo">Traducción:</div>
<div id="resultado">---</div>
</div>

</div>

<script>

const escucharBtn = document.getElementById("escuchar");
const pararBtn = document.getElementById("parar");

const textoDiv = document.getElementById("texto");
const resultadoDiv = document.getElementById("resultado");
const estadoDiv = document.getElementById("estado");

let recognition;

function normalizar(texto){

    return texto
    .toLowerCase()
    .replace(/[.,!?¿¡]/g,"")

    // Variantes que reconoce mal Chrome
    .replace(/\btwo\b/g,"chu")
    .replace(/\btu\b/g,"chu")
    .replace(/\btú\b/g,"chu")
    .replace(/\bchoo\b/g,"chu")
    .replace(/\bchú\b/g,"chu")
    .replace(/\bshu\b/g,"chu")

    .trim();
}

function traducir(texto){

    texto = normalizar(texto);

    let palabras = texto.split(/\s+/);

    let resultado = "";

    for(let i=0; i<palabras.length; i++){

        if(palabras[i] === "chu"){

            if(i + 1 < palabras.length){

                resultado += palabras[i + 1];
                i++;

            }

        }

    }

    return resultado;
}

if("webkitSpeechRecognition" in window){

    recognition = new webkitSpeechRecognition();

    recognition.lang = "es-ES";
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onstart = () => {

        estadoDiv.textContent = "Escuchando...";

    };

    recognition.onresult = (event) => {

        let texto = "";

        for(let i=event.resultIndex; i<event.results.length; i++){

            texto += event.results[i][0].transcript;

        }

        texto = texto.toLowerCase();

        textoDiv.textContent = texto;

        resultadoDiv.textContent = traducir(texto);

    };

    recognition.onerror = (event) => {

        estadoDiv.textContent = "Error: " + event.error;

    };

    recognition.onend = () => {

        estadoDiv.textContent = "Parado";

    };

}

escucharBtn.onclick = () => {

    recognition.start();

};

pararBtn.onclick = () => {

    recognition.stop();

};

</script>

</body>
</html>
